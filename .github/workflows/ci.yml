name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          SESSION_SECRET: ci-session-secret-with-at-least-32-characters
          AUTH_PASSWORD: ci-password
          DATABASE_URL: postgresql://test:test@localhost:5432/limen_ci
      - run: npm audit --audit-level=high
