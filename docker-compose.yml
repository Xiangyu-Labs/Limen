services:
  limen:
    image: ghcr.io/xiangyu-labs/limen:latest
    container_name: limen
    restart: unless-stopped
    networks:
      - server-internal-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.limen.rule=Host(`diary.xiangyu.pro`)"
      - "traefik.http.routers.limen.entrypoints=websecure"
      - "traefik.http.routers.limen.tls=true"
      - "traefik.http.routers.limen.tls.certresolver=myresolver"
      - "traefik.http.services.limen.loadbalancer.server.port=3000"
    environment:
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      AI_BASE_URL: ${AI_BASE_URL}
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/limen.db}
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    volumes:
      - ./data:/app/data

networks:
  server-internal-net:
    external: true
