services:
  limen:
    image: ghcr.io/xiangyu-labs/limen:latest
    container_name: limen
    restart: unless-stopped
    environment:
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      AI_BASE_URL: ${AI_BASE_URL}
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/limen.db}
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    volumes:
      - ./data:/app/data

  watchtower:
    image: containrrr/watchtower
    container_name: limen-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
    command: limen
    restart: unless-stopped
